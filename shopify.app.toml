# Velora Bundles — Shopify App Configuration
name = "velora-bundles"
client_id = "30b889dcdb987712cf618ecbb7c7612e"
application_url = "https://velora-bundles-production.up.railway.app"
embedded = true

[access_scopes]
scopes = "write_products,read_orders,write_discounts,read_themes"

[auth]
redirect_urls = [ "https://velora-bundles-production.up.railway.app/auth/callback" ]

[webhooks]
api_version = "2025-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = ["app/uninstalled"]

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = ["app/scopes_update"]

  [[webhooks.subscriptions]]
  uri = "/webhooks"
  topics = ["products/update"]

[build]
automatically_update_urls_on_dev = true
